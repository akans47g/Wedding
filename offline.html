<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sam & Sofia – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a1628;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Georgia', serif;
      color: #c9a96e;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 320px;
    }
    .heart { font-size: 56px; margin-bottom: 24px; display: block; animation: beat 1.5s ease-in-out infinite; }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      25%      { transform: scale(1.2); }
      50%      { transform: scale(1); }
      75%      { transform: scale(1.1); }
    }
    h1 { font-size: 28px; margin-bottom: 12px; color: #e8c87a; }
    p  { font-size: 15px; line-height: 1.7; color: rgba(201,169,110,0.75); margin-bottom: 28px; }
    button {
      background: linear-gradient(135deg, #c9a96e, #b8934a);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .ornament { font-size: 14px; letter-spacing: 6px; margin-bottom: 20px; color: rgba(201,169,110,0.5); }
  </style>
</head>
<body>
  <div class="card">
    <span class="heart">♥</span>
    <div class="ornament">✦ ── ✦ ── ✦</div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your connection. Please reconnect to view the wedding invitation.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
